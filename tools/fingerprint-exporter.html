<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浏览器指纹导出工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 1rem;
    }

    .content {
      padding: 2rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 0.5rem;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    button {
      flex: 1;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .status.info {
      background: #dbeafe;
      color: #1e40af;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status.warning {
      background: #fef3c7;
      color: #92400e;
    }

    .fingerprint-preview {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .fingerprint-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      border-bottom: 1px solid #e5e7eb;
    }

    .fingerprint-item:last-child {
      border-bottom: none;
    }

    .fingerprint-key {
      font-weight: 600;
      color: #667eea;
    }

    .fingerprint-value {
      color: #666;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }

    pre {
      background: #1f2937;
      color: #f3f4f6;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .progress {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s ease;
    }

    .footer {
      background: #f9fafb;
      padding: 1.5rem;
      text-align: center;
      color: #666;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 浏览器指纹导出工具</h1>
      <p>自动收集当前浏览器的完整指纹信息，用于反检测配置</p>
    </div>

    <div class="content">
      <div class="section">
        <div id="status" class="status info">
          准备就绪，点击「收集指纹」开始
        </div>
        <div id="progress-container" style="display: none;">
          <div class="progress">
            <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="button-group">
          <button id="collectBtn" class="btn-primary" onclick="collectFingerprint()">
            🚀 收集指纹
          </button>
          <button id="downloadBtn" class="btn-success" onclick="downloadJSON()" disabled>
            💾 下载 JSON
          </button>
          <button id="copyBtn" class="btn-secondary" onclick="copyToClipboard()" disabled>
            📋 复制到剪贴板
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">指纹预览</div>
        <div id="preview" class="fingerprint-preview">
          <p style="color: #999; text-align: center; padding: 2rem;">
            尚未收集指纹数据
          </p>
        </div>
      </div>

      <div class="section">
        <div class="section-title">完整 JSON 输出</div>
        <pre id="output" style="display: none;"></pre>
      </div>
    </div>

    <div class="footer">
      <p>⚠️ 此工具仅用于授权测试和研究目的</p>
      <p>收集的指纹数据仅在本地处理，不会上传到任何服务器</p>
    </div>
  </div>

  <script src="fingerprint-collector.js"></script>
</body>
</html>
