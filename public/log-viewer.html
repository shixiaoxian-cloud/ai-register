<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时日志监控 - AI Register</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #252526;
      padding: 15px 20px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #cccccc;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #0e639c;
      color: white;
    }

    .btn-primary:hover {
      background: #1177bb;
    }

    .btn-danger {
      background: #d13438;
      color: white;
    }

    .btn-danger:hover {
      background: #e81123;
    }

    .btn-secondary {
      background: #3e3e42;
      color: #cccccc;
    }

    .btn-secondary:hover {
      background: #505050;
    }

    .status-bar {
      background: #007acc;
      color: white;
      padding: 8px 20px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-bar.success {
      background: #16825d;
    }

    .status-bar.error {
      background: #d13438;
    }

    .status-bar.warning {
      background: #e8ab02;
    }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 250px;
      background: #252526;
      border-right: 1px solid #3e3e42;
      padding: 15px;
      overflow-y: auto;
    }

    .filter-section {
      margin-bottom: 20px;
    }

    .filter-section h3 {
      font-size: 13px;
      color: #cccccc;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-option {
      display: flex;
      align-items: center;
      padding: 6px 0;
      cursor: pointer;
    }

    .filter-option input[type="checkbox"] {
      margin-right: 8px;
    }

    .filter-option label {
      font-size: 13px;
      cursor: pointer;
      flex: 1;
    }

    .log-container {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .log-entry {
      padding: 4px 8px;
      margin-bottom: 2px;
      border-left: 3px solid transparent;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-entry:hover {
      background: #2a2d2e;
    }

    .log-entry.info {
      border-left-color: #007acc;
      color: #4fc1ff;
    }

    .log-entry.success {
      border-left-color: #16825d;
      color: #4ec9b0;
    }

    .log-entry.error {
      border-left-color: #d13438;
      color: #f48771;
    }

    .log-entry.warning {
      border-left-color: #e8ab02;
      color: #dcdcaa;
    }

    .log-entry.debug {
      border-left-color: #858585;
      color: #858585;
    }

    .log-timestamp {
      color: #858585;
      margin-right: 10px;
    }

    .log-tag {
      color: #c586c0;
      font-weight: 600;
      margin-right: 8px;
    }

    .log-message {
      color: #d4d4d4;
    }

    .stats {
      display: flex;
      gap: 20px;
      padding: 15px 20px;
      background: #252526;
      border-top: 1px solid #3e3e42;
      font-size: 12px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label {
      color: #858585;
    }

    .stat-value {
      color: #cccccc;
      font-weight: 600;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #858585;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .empty-state-text {
      font-size: 14px;
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #3e3e42;
      border-top-color: #007acc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auto-scroll-indicator {
      position: fixed;
      bottom: 80px;
      right: 30px;
      background: #007acc;
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .search-box {
      width: 100%;
      padding: 8px 12px;
      background: #3c3c3c;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      color: #cccccc;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .search-box:focus {
      outline: none;
      border-color: #007acc;
    }

    .highlight {
      background: #e8ab02;
      color: #1e1e1e;
      padding: 0 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 实时日志监控</h1>
    <div class="controls">
      <button class="btn btn-primary" id="startBtn">▶ 开始测试</button>
      <button class="btn btn-danger" id="stopBtn" disabled>⏹ 停止</button>
      <button class="btn btn-secondary" id="clearBtn">🗑 清空日志</button>
      <button class="btn btn-secondary" id="exportBtn">💾 导出日志</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <span id="statusText">就绪</span>
    <span id="statusTime">--:--:--</span>
  </div>

  <div class="main-content">
    <div class="sidebar">
      <input type="text" class="search-box" id="searchBox" placeholder="搜索日志...">

      <div class="filter-section">
        <h3>日志级别</h3>
        <div class="filter-option">
          <input type="checkbox" id="filter-info" checked>
          <label for="filter-info">ℹ️ 信息</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter-success" checked>
          <label for="filter-success">✅ 成功</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter-warning" checked>
          <label for="filter-warning">⚠️ 警告</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter-error" checked>
          <label for="filter-error">❌ 错误</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter-debug" checked>
          <label for="filter-debug">🐛 调试</label>
        </div>
      </div>

      <div class="filter-section">
        <h3>日志标签</h3>
        <div id="tagFilters"></div>
      </div>

      <div class="filter-section">
        <h3>选项</h3>
        <div class="filter-option">
          <input type="checkbox" id="autoScroll" checked>
          <label for="autoScroll">自动滚动</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="showTimestamp" checked>
          <label for="showTimestamp">显示时间戳</label>
        </div>
      </div>
    </div>

    <div class="log-container" id="logContainer">
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div class="empty-state-text">等待日志输出...</div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">总计:</span>
      <span class="stat-value" id="totalLogs">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">信息:</span>
      <span class="stat-value" id="infoCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">成功:</span>
      <span class="stat-value" id="successCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">警告:</span>
      <span class="stat-value" id="warningCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">错误:</span>
      <span class="stat-value" id="errorCount">0</span>
    </div>
  </div>

  <script>
    // WebSocket 连接
    let ws = null;
    const WS_URL = 'ws://localhost:3100';

    // 日志管理
    const logs = [];
    const tags = new Set();
    let isRunning = false;
    let startTime = null;

    // DOM 元素
    const logContainer = document.getElementById('logContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    const statusTime = document.getElementById('statusTime');
    const searchBox = document.getElementById('searchBox');
    const autoScrollCheckbox = document.getElementById('autoScroll');
    const showTimestampCheckbox = document.getElementById('showTimestamp');

    // 统计元素
    const totalLogsEl = document.getElementById('totalLogs');
    const infoCountEl = document.getElementById('infoCount');
    const successCountEl = document.getElementById('successCount');
    const warningCountEl = document.getElementById('warningCount');
    const errorCountEl = document.getElementById('errorCount');

    // 连接 WebSocket
    function connectWebSocket() {
      updateStatusBar('正在连接...', 'info');

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log('WebSocket 已连接');
        updateStatusBar('已连接到服务器', 'success');
        startBtn.disabled = false;
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'log') {
            addLog(data.message, data.level);
          } else if (data.type === 'status') {
            updateStatusBar(data.message, data.status);

            if (data.status === 'running') {
              isRunning = true;
              startTime = Date.now();
              startBtn.disabled = true;
              stopBtn.disabled = false;
            } else {
              isRunning = false;
              startBtn.disabled = false;
              stopBtn.disabled = true;
            }
          }
        } catch (error) {
          console.error('解析消息失败:', error);
        }
      };

      ws.onerror = (error) => {
        console.error('WebSocket 错误:', error);
        updateStatusBar('连接错误', 'error');
      };

      ws.onclose = () => {
        console.log('WebSocket 已断开');
        updateStatusBar('连接已断开，正在重连...', 'warning');
        startBtn.disabled = true;
        stopBtn.disabled = true;

        // 5秒后重连
        setTimeout(connectWebSocket, 5000);
      };
    }

    // 解析日志级别
    function parseLogLevel(message) {
      if (message.includes('✓') || message.includes('成功')) return 'success';
      if (message.includes('✗') || message.includes('失败') || message.includes('错误')) return 'error';
      if (message.includes('警告') || message.includes('Warning')) return 'warning';
      if (message.includes('[DEBUG]')) return 'debug';
      return 'info';
    }

    // 解析日志标签
    function parseLogTag(message) {
      const match = message.match(/\[([^\]]+)\]/);
      return match ? match[1] : 'General';
    }

    // 添加日志
    function addLog(message, level = null) {
      const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const detectedLevel = level || parseLogLevel(message);
      const tag = parseLogTag(message);

      const log = {
        timestamp,
        level: detectedLevel,
        tag,
        message,
        id: Date.now() + Math.random()
      };

      logs.push(log);
      tags.add(tag);

      renderLog(log);
      updateStats();
      updateTagFilters();

      if (autoScrollCheckbox.checked) {
        logContainer.scrollTop = logContainer.scrollHeight;
      }
    }

    // 渲染单条日志
    function renderLog(log) {
      // 检查过滤器
      const levelFilter = document.getElementById(`filter-${log.level}`);
      if (levelFilter && !levelFilter.checked) return;

      const tagFilter = document.getElementById(`tag-${log.tag}`);
      if (tagFilter && !tagFilter.checked) return;

      // 检查搜索
      const searchTerm = searchBox.value.toLowerCase();
      if (searchTerm && !log.message.toLowerCase().includes(searchTerm)) return;

      // 移除空状态
      const emptyState = logContainer.querySelector('.empty-state');
      if (emptyState) {
        emptyState.remove();
      }

      const entry = document.createElement('div');
      entry.className = `log-entry ${log.level}`;
      entry.dataset.logId = log.id;

      let html = '';
      if (showTimestampCheckbox.checked) {
        html += `<span class="log-timestamp">${log.timestamp}</span>`;
      }
      html += `<span class="log-tag">[${log.tag}]</span>`;

      let message = log.message;
      if (searchTerm) {
        const regex = new RegExp(`(${searchTerm})`, 'gi');
        message = message.replace(regex, '<span class="highlight">$1</span>');
      }
      html += `<span class="log-message">${message}</span>`;

      entry.innerHTML = html;
      logContainer.appendChild(entry);
    }

    // 重新渲染所有日志
    function rerenderLogs() {
      // 清空容器
      logContainer.innerHTML = '';

      if (logs.length === 0) {
        logContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-text">等待日志输出...</div>
          </div>
        `;
        return;
      }

      logs.forEach(log => renderLog(log));
    }

    // 更新统计
    function updateStats() {
      totalLogsEl.textContent = logs.length;
      infoCountEl.textContent = logs.filter(l => l.level === 'info').length;
      successCountEl.textContent = logs.filter(l => l.level === 'success').length;
      warningCountEl.textContent = logs.filter(l => l.level === 'warning').length;
      errorCountEl.textContent = logs.filter(l => l.level === 'error').length;
    }

    // 更新标签过滤器
    function updateTagFilters() {
      const tagFiltersContainer = document.getElementById('tagFilters');
      tagFiltersContainer.innerHTML = '';

      Array.from(tags).sort().forEach(tag => {
        if (!document.getElementById(`tag-${tag}`)) {
          const div = document.createElement('div');
          div.className = 'filter-option';
          div.innerHTML = `
            <input type="checkbox" id="tag-${tag}" checked>
            <label for="tag-${tag}">${tag}</label>
          `;
          tagFiltersContainer.appendChild(div);

          document.getElementById(`tag-${tag}`).addEventListener('change', rerenderLogs);
        }
      });
    }

    // 更新状态栏
    function updateStatusBar(status, type = 'info') {
      statusBar.className = `status-bar ${type}`;
      statusText.textContent = status;

      if (startTime) {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        statusTime.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }
    }

    // 开始测试
    function startTest() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'start' }));
      } else {
        updateStatusBar('未连接到服务器', 'error');
      }
    }

    // 停止测试
    function stopTest() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop' }));
      }
    }

    // 清空日志
    function clearLogs() {
      logs.length = 0;
      tags.clear();
      logContainer.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-text">等待日志输出...</div>
        </div>
      `;
      updateStats();
      updateTagFilters();
    }

    // 导出日志
    function exportLogs() {
      const content = logs.map(log =>
        `[${log.timestamp}] [${log.tag}] [${log.level.toUpperCase()}] ${log.message}`
      ).join('\n');

      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `logs-${new Date().toISOString().replace(/[:.]/g, '-')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 事件监听
    startBtn.addEventListener('click', startTest);
    stopBtn.addEventListener('click', stopTest);
    clearBtn.addEventListener('click', clearLogs);
    exportBtn.addEventListener('click', exportLogs);
    searchBox.addEventListener('input', rerenderLogs);
    showTimestampCheckbox.addEventListener('change', rerenderLogs);

    // 过滤器事件
    ['info', 'success', 'warning', 'error', 'debug'].forEach(level => {
      document.getElementById(`filter-${level}`).addEventListener('change', rerenderLogs);
    });

    // 更新时间
    setInterval(() => {
      if (isRunning) {
        updateStatusBar('运行中...', 'info');
      }
    }, 1000);

    // 初始化
    updateStats();
    connectWebSocket();
  </script>
</body>
</html>
